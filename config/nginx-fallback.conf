# ═══════════════════════════════════════════════════════════════
# V7LTHRONYX VPN Panel — Nginx Fallback Configuration
# ═══════════════════════════════════════════════════════════════
# This nginx config serves as the active probing defense.
# When Iran's DPI probes the server on port 80, it sees a
# legitimate-looking website. Port 443 is handled by Xray
# with REALITY, which falls back to this nginx on port 8443.
# ═══════════════════════════════════════════════════════════════

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/fallback;
    index index.html index.htm;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;" always;

    # Hide nginx version
    server_tokens off;

    # Logging — minimal to avoid filling disk
    access_log /var/log/nginx/fallback_access.log;
    error_log /var/log/nginx/fallback_error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    # Block common probe paths
    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }

    # Return realistic 404 for non-existent paths
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        internal;
    }

    location = /50x.html {
        internal;
    }
}

# ═══════════════════════════════════════════════════════════════
# Fallback for Xray REALITY on port 8443
# When Xray can't match a REALITY connection, it forwards
# the connection here. This serves the same decoy website
# over HTTPS, making the server look like a normal web server.
# ═══════════════════════════════════════════════════════════════

server {
    listen 127.0.0.1:8443 ssl;
    server_name _;

    root /var/www/fallback;
    index index.html index.htm;

    # Self-signed cert for the fallback (Xray handles REALITY)
    ssl_certificate /etc/nginx/ssl/fallback.crt;
    ssl_certificate_key /etc/nginx/ssl/fallback.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    server_tokens off;

    location / {
        try_files $uri $uri/ =404;
    }

    # Block common probe paths
    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}