      <input type="number" id="aggressive-duration" placeholder="60" value="10">
    </div>
    
    <div class="form-group" style="margin-bottom:16px">
      <label>Attack Type:</label>

        <option value="http_flood">HTTP Flood Layer 7</option>
        <option value="dns_amp">DNS Amplification</option>
        <option value="ntp_amp">NTP Amplification</option>
        <option value="combined">Combined Attack</option>

    <div class="form-group" style="margin-bottom:16px" id="aggressive-ports-group" style="display:none">
      <label>UDP Ports (comma-separated):</label>
      <input type="text" id="aggressive-ports" placeholder="53,80,443,8080" value="53,80,443">

    <div class="form-group" style="margin-bottom:16px" id="aggressive-dns-group" style="display:none">

    <div class="form-group" style="margin-bottom:16px" id="aggressive-ntp-group" style="display:none">

      <input type="text" id="aggressive-ntp-servers" placeholder="pool.ntp.org,time.nist.gov" value="pool.ntp.org">

    <div class="form-group" style="margin-bottom:16px" id="aggressive-url-group" style="display:none">
      <label>Target URL:</label>
      <input type="text" id="aggressive-target-url" placeholder="https://example.com" value="http://127.0.0.1">

    <div class="modal-actions">
      <button class="btn btn-orange" onclick="startResilienceOp()">Start Operation</button>
      <button class="btn btn-danger" onclick="stopResilienceOps()">Stop All Operations</button>
      <button class="btn btn-outline" onclick="hideModal('aggressive-modal')">Close</button>
    </div>
    
    <div id="aggressive-status" style="margin-top:16px;padding:12px;background:rgba(255,255,255,.02);border-radius:var(--radius-sm);display:none">

      <div id="aggressive-status-text" style="font-size:13px;color:var(--t0)">No active attacks</div>
    </div>
  </div>
</div>

  </div>
</div>
