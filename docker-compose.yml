version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: spiritus-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spiritus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-spiritus}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spiritus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spiritus-net

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: spiritus-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spiritus-net

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spiritus-app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-spiritus}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-spiritus}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "38471:38471"
      - "10085:10085"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    networks:
      - spiritus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38471/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: spiritus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - spiritus-net

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: spiritus-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_SECURITY_ALLOW_EMBED_INITIATION: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - spiritus-net

volumes:
  db_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  spiritus-net:
    driver: bridge
