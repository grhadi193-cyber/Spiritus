[pytest]
# Pytest configuration

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    slow: Slow running tests
    skip_ci: Skip in CI/CD pipeline

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=70

# Coverage options
[coverage:run]
source = app
omit = 
    */tests/*
    */test_*.py
    */__init__.py
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

# Asyncio mode for async tests
asyncio_mode = auto

# Test paths
testpaths = tests

# Timeout for tests (seconds)
timeout = 300
